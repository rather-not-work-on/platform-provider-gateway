name: Provider Gateway Local CI

on:
  pull_request:
    paths:
      - ".gitignore"
      - "README.md"
      - "docs/**"
      - "contracts/**"
      - "config/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "tsconfig.base.json"
      - "services/**"
      - "adapters/**"
      - "scripts/**"
      - "runtime-artifacts/README.md"
      - ".github/workflows/provider-local-ci.yml"
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  provider-local-ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python3 -m pip install --upgrade pip && python3 -m pip install -r requirements-dev.txt

      - name: Run provider smoke scenarios
        run: |
          mkdir -p /tmp/provider/smoke
          python3 scripts/litellm_gateway_smoke.py \
            --scenario primary_success \
            --run-id "ci-${{ github.run_id }}-provider" \
            --output-dir /tmp/provider/smoke
          python3 scripts/litellm_gateway_smoke.py \
            --scenario primary_fail_fallback_success \
            --run-id "ci-${{ github.run_id }}-provider" \
            --output-dir /tmp/provider/smoke
          python3 scripts/validate_provider_smoke_evidence.py \
            --report "/tmp/provider/smoke/ci-${{ github.run_id }}-provider-primary_success.json" \
            --output /tmp/provider/provider-primary-success-validation.json
          python3 scripts/validate_provider_smoke_evidence.py \
            --report "/tmp/provider/smoke/ci-${{ github.run_id }}-provider-primary_fail_fallback_success.json" \
            --output /tmp/provider/provider-fallback-validation.json

      - name: Validate contract pin
        run: |
          mkdir -p /tmp/provider
          python3 scripts/validate_contract_pin.py \
            --output /tmp/provider/contract-pin-report.json

      - name: Verify topology README contract
        run: bash scripts/test_module_readmes.sh

      - name: Seeded failure guard (contract violation + invalid pin)
        run: bash scripts/test_provider_guardrails.sh
